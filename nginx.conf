# Nginx config for offlinellm.me
# Place at: /etc/nginx/sites-available/offlinellm.me
# Then: ln -s /etc/nginx/sites-available/offlinellm.me /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name offlinellm.me www.offlinellm.me;

    # Serve the React frontend
    root /var/www/offlinellm;
    index index.html;

    # SPA routing — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:5000;
    }
}
